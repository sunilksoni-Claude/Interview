the next team. Slower start, compounding returns.\n\nIt also taught me the difference between vanity metrics (enrollment numbers, launch announcements) and truth metrics (daily active usage, use case ideas generated, measurable time saved)."},{id:"t3q6",category:"Failure & Learning",difficulty:"Advanced",question:"Tell me about a time you got significant pushback on a decision you'd made. How did you respond?",answer:"When I introduced a token-cost governance framework for our GitHub Copilot deployment — routing different task types to different AI models based on cost-efficiency — I got significant pushback from senior engineers. Their view: 'You're optimizing for cost and it's going to hurt our productivity.'\n\nMy initial instinct was to defend the framework. But I paused and asked: is the pushback wrong, or is it telling me something I missed?\n\nI went back to the data. The engineers were right about one thing: the routing logic was too blunt. It was routing based on task category alone without accounting for task complexity — so a genuinely complex architectural question was getting routed to a lighter model the same way a simple boilerplate completion was.\n\nI came back and said: 'You're right that the current implementation is too coarse. Here's what I got wrong in the design. Here's how I'd like to fix it — with your input on where the complexity thresholds should sit.' We redesigned the routing logic together.\n\nThe framework shipped with better logic and with genuine team buy-in. What I learned: pushback from technically strong people is often a data point, not just resistance."},{id:"t3q7",category:"Market Awareness",difficulty:"Intermediate",question:"How do you stay current in AI? What are you learning or experimenting with right now?",answer:"I stay current through four channels:\n\nFirst, I build things. The fastest way to understand a new AI capability is to build a small project with it. My personal side projects — a bansuri music PWA with Web Audio API, a subtitle editor, a voice transcription tool — are deliberate learning vehicles. This produces durable understanding, not just familiarity.\n\nSecond, I follow practitioners, not commentators. I track researchers and engineers building at the frontier — people like Andrej Karpathy whose CLAUDE.md principles directly influenced how I structure AI development governance.\n\nThird, I run structured evals inside my team. Every month we test our key AI tools against new model releases and capability updates. This keeps our technology choices honest.\n\nFourth, I maintain a network of external AI leaders — peers at other enterprises, Google Cloud and Anthropic technical contacts, and AI-forward CTOs I exchange ideas with quarterly.\n\nWhat I'm working on right now: agentic AI cost governance at scale — specifically, how to manage token costs and model routing for multi-step AI agents without sacrificing capability.\n\n💡 Mentioning Karpathy signals genuine depth. The 'I build things' credibility signal is powerful for a Director-level technical leader."},{id:"t3q8",category:"Market Awareness",difficulty:"Advanced",question:"Which companies are doing AI well in healthcare or healthcare distribution? What should Cardinal Health learn from them?",answer:"A few examples I watch closely:\n\nMcKesson and AmerisourceBergen — our most direct comparators — are investing heavily in AI for demand forecasting and specialty distribution optimization. Neither has publicly claimed a breakout AI advantage yet, which tells me the space is still early and the window for differentiation is real.\n\nIn the broader healthcare supply chain, Coupa and o9 Solutions have shown what AI-driven demand sensing can do when applied to complex, multi-echelon supply chains. The lesson for Cardinal Health: the value isn't in the AI model itself — it's in the quality of the demand signal data feeding it. Data quality and real-time connectivity are the actual competitive moat.\n\nIn clinical AI, Epic's embedded AI in EHR workflows proves that AI only gets adopted when it's inside the workflow, not beside it. A separate AI tool that requires switching context almost always loses to a mediocre AI that's embedded in the tool people already live in.\n\nThe most important lesson: AI ROI in healthcare compounds when you own the data relationship. Cardinal Health's position in the supply chain — touching an enormous volume of transaction, utilization, and outcomes data — is a structural advantage that most AI vendors would kill for.\n\n💡 Knowing competitor names at this level signals genuine industry engagement."},{id:"t3q9",category:"Market Awareness",difficulty:"Advanced",question:"What AI developments in the last 6 months do you think have the most significant implications for Cardinal Health?",answer:"Three developments I'm tracking closely:\n\nOne — Agentic AI moving from experimental to operational: Tools like Claude's computer use capability and multi-agent orchestration frameworks (AutoGen, CrewAI, Claude's Agents SDK) are crossing the threshold from interesting demos to deployable enterprise solutions. For Cardinal Health this means AI that can take actions across our systems — placing orders, generating alerts, updating records — with appropriate human oversight. The governance design for this class of AI needs to be built now, before the use cases outpace our controls.\n\nTwo — Dramatic improvements in document and multimodal AI: The ability to extract structured information from unstructured documents — contracts, clinical records, invoices, regulatory submissions — has improved dramatically. Cardinal Health processes enormous volumes of such documents across Legal, Regulatory, Finance, and Supply Chain. This is probably the highest near-term ROI category for us.\n\nThree — AI coding tools maturing into development acceleration platforms: GitHub Copilot, Cursor, and similar tools are moving from autocomplete to full agentic development cycles. A genuine velocity multiplier for internal software delivery — but only if we have governance and quality controls in place to manage AI-generated code at scale."},{id:"t3q10",category:"Self-Awareness",difficulty:"Intermediate",question:"What is your leadership blind spot, and how do you actively manage it?",answer:"My most consistent blind spot is pace — I move fast and I assume others can and want to move at the same speed. For me, ambiguity is energizing; I'm comfortable making decisions with incomplete information and iterating. But I've learned that not everyone on a team experiences ambiguity that way, and when I don't slow down to bring people along, I create anxiety and disengagement.\n\nI've received this feedback from direct reports at different points in my career. When I've dug into exit conversations, pace and clarity of direction come up consistently.\n\nWhat I do to actively manage it: I've built deliberate slow-down mechanisms into my leadership rhythm. Every significant initiative now has a written brief — not just in my head or in a deck — so people have a reference point independent of my pace. I start sprint planning with explicit context-setting. I've also asked my senior engineers to flag me when the team is unclear on direction.\n\nI'll tell you honestly: it's an ongoing discipline, not a solved problem. I still catch myself moving faster than the team is ready for. But I catch it earlier than I used to.\n\n💡 'Pace' is a credible and common blind spot for high-performing leaders. Never say your blind spot is 'I work too hard' or 'I care too much' — it signals low self-awareness instantly."},{id:"t3q11",category:"Self-Awareness",difficulty:"Intermediate",question:"How would your direct reports describe your leadership style — including the hard parts?",answer:"I think they'd say a few consistent things:\n\nThe positive: I advocate hard for my team and give people real ownership. I don't micromanage technical decisions. I push people to grow into roles that are slightly bigger than they're ready for — and most of them would say, looking back, that's where they grew the most. They'd also say I'm technically credible — I can engage on the real work, not just the PowerPoint version of it.\n\nThe hard parts: I move fast and the direction can shift when new information comes in — which can feel disorienting if you're in the middle of building something. I have high standards and I don't always communicate appreciation as explicitly as I should when those standards are met. And I can go deep into problem-solving mode in a way that crowds out the space for others to think out loud.\n\nI've made it a practice to ask specifically: 'What's one thing I do that makes your job harder?' The answers have been more useful than any 360 survey.\n\nIf I had to summarize: a demanding, caring leader who opens doors, moves fast, and doesn't always slow down enough to explain why.\n\n💡 The 'what's one thing I do that makes your job harder?' question signals psychological safety and genuine self-inquiry."},{id:"t3q12",category:"Self-Awareness",difficulty:"Advanced",question:"What would you do differently if you could redo one major initiative from your career?",answer:"The initiative I think about most is our AI training program — Project Prometheus. I'm proud of what it delivered: 250+ employees trained, strong engagement, real use case ideas generated afterward.\n\nBut if I could redo it, I would have invested more in the 90 days after the training, not just the training itself.\n\nWhat I got right: the curriculum design, the facilitation, the executive visibility, the multi-tier approach (executive, analyst, engineer tracks). People left energized.\n\nWhat I got wrong: I didn't build a strong enough support structure for what came next. When trainees went back to their desks and tried to apply what they'd learned, many hit friction — tools they didn't have access to, use case ideas with no clear path to funding, managers who weren't sure how to support AI experimentation. The energy dissipated faster than it should have.\n\nIf I ran it again: a 30-day challenge with a specific use case to attempt. A peer network to share progress. A fast-track process for the best use case ideas to get small amounts of funding and technical support within 60 days. Champions designated in advance in each business unit.\n\nThe lesson: a training program is a spark. The infrastructure around it is what determines whether the spark becomes a fire or fades out."},{id:"t3q13",category:"Conflict",difficulty:"Advanced",question:"Tell me about a time you disagreed with your manager or a senior executive decision. How did you handle it?",answer:"There was a point where executive leadership wanted to prioritize a broad AI awareness campaign — essentially a company-wide AI literacy push — at a moment when I believed our most urgent need was deepening capability in a small number of high-value, production-ready use cases.\n\nI disagreed, and I said so — but in the right forum and with the right framing.\n\nI didn't push back in the moment of the decision. I asked for a 30-minute working session. I came prepared with a one-page analysis showing what broad awareness delivers vs. what focused capability delivery delivers, the resource tradeoff, and my recommendation.\n\nMy recommendation was a hybrid: run the awareness campaign with the existing enablement team while I focused the applied AI engineering team exclusively on production delivery.\n\nThe executive accepted the hybrid approach. The awareness campaign ran successfully. The applied AI team delivered two production solutions that quarter with documented business impact.\n\nWhat I carry from that: disagree in private, commit in public. And when you disagree, always come with a constructive alternative — not just a problem.\n\n💡 'Disagree in private, commit in public' is a phrase worth memorizing — clean, credible, memorable."},{id:"t3q14",category:"Conflict",difficulty:"Advanced",question:"How do you handle a situation where you're asked to deliver something you believe is technically flawed or strategically wrong?",answer:"I distinguish between three categories of 'wrong' and respond differently to each.\n\nWrong because of incomplete information: I bring the information forward immediately, clearly, and without drama. 'Before we commit to this approach, I want to make sure you have visibility into [specific issue] and its implications. Here is my assessment. Would you like to revisit the direction with this in mind?' Most of the time, the direction adjusts.\n\nWrong because of value or ethics conflict: If I'm asked to build something that violates responsible AI principles, compromises patient data, or creates material regulatory exposure, I escalate. Not as an ultimatum, but as a structured conversation with alternative approaches. If alternatives are refused and the risk is material, I escalate to the relevant governance function. This is non-negotiable for me.\n\nWrong because I simply disagree strategically: I advocate once, clearly and with evidence. If the decision stands, I execute it with full commitment. I document my position and reserve the right to say 'I told you so' — constructively — if the outcome validates my concern, so we can learn from it.\n\nThe underlying principle: organizational courage means saying the hard thing once. It doesn't mean relitigating decided questions."},{id:"t3q15",category:"Talent & Scaling",difficulty:"Advanced",question:"If you had to significantly grow this Applied AI team in the next 12 months, how would you approach talent strategy?",answer:"AI talent scarcity is real and getting worse. My talent strategy has three tracks running simultaneously:\n\nTrack 1 — Targeted external hiring for needle-movers: I hire externally for 2-3 high-leverage roles where the skill genuinely doesn't exist internally — typically a senior AI architect and a GenAI/LLM engineer with production deployment experience. For these roles I don't rely on job postings alone. I identify specific people through GitHub contributions, conference talks, and practitioner communities, and I recruit directly. I also leverage our Google Cloud and Anthropic partnership contacts.\n\nTrack 2 — Internal mobility and development: The fastest, most culturally-aligned talent is already inside Cardinal Health. I run structured development paths: a 90-day AI engineering track with real project work, mentorship from senior AI engineers, and a graduation milestone tied to shipping something.\n\nTrack 3 — Managed service partner optimization: Genpact and Accenture can scale capacity faster than hiring, but only if I manage them as an extension of the team. I embed their leads in our delivery rituals and set explicit skill expectations.\n\nThe retention piece is as important as the hiring piece: AI engineers leave for three reasons — they stop learning, they don't see impact, or they feel undervalued. I address all three through our accelerator culture, production delivery focus, and the AI Shark Tank recognition mechanism."},{id:"t3q16",category:"Talent & Scaling",difficulty:"Intermediate",question:"How do you evaluate AI engineering talent? What do you look for beyond technical skills?",answer:"Technical evaluation: I use a structured assessment that goes beyond LeetCode — I give candidates a real-world AI problem: here is a business context, here is a dataset, here is a vague requirement. Design a solution, prototype the core, tell me what you'd measure, and tell me what could go wrong. This tests architecture thinking, practical AI knowledge, and intellectual honesty simultaneously.\n\nBeyond technical skills, I look for four things:\n\nProblem formulation ability: Can they take an ambiguous business question and decompose it into a precise, solvable AI problem? This is rarer than it sounds. Most engineers are good at building solutions once the problem is defined — the best ones can define the problem themselves.\n\nPragmatism over elegance: I watch for engineers who reach for the simplest thing that works. A reliable rule-based system that solves 80% of the problem is often better than an LLM that solves 95% unreliably.\n\nCommunication range: Can they explain what they built to a business stakeholder in plain language? The best AI engineers I've hired could shift register fluently.\n\nIntellectual honesty: An engineer who can articulate where their model will fail and what they'd do about it is far more valuable than one who can only tell me why it works."},{id:"t3q17",category:"Why Cardinal",difficulty:"Advanced",question:"Cardinal Health is a healthcare distributor — not a tech company. Where do you genuinely believe AI can transform this business, and where are the real limits?",answer:"This is the most interesting strategic question in this role, and I want to answer it honestly rather than optimistically.\n\nWhere AI genuinely transforms the business:\nSupply chain intelligence is the highest-conviction opportunity. Cardinal Health moves an enormous volume of product across a complex, multi-echelon supply chain. AI applied to demand forecasting, inventory optimization, and logistics routing at this scale can produce material cost and service quality improvements that compound over time.\n\nContract and compliance intelligence is proven and scalable. The CARA work I've done is a proof point: complex, high-volume document review is a high-ROI AI application in any regulated industry.\n\nField sales productivity and customer intelligence — helping field reps prioritize accounts, surface at-risk customers, and personalize outreach.\n\nWhere the real limits are:\nAI doesn't replace the relationship. Cardinal Health's competitive position is built on trust relationships between field reps and healthcare customers. AI can make those reps more effective; it cannot replace the relationship itself.\n\nData quality and integration debt is real. The ROI of AI is directly proportional to data quality. If our transactional, operational, and customer data has integrity issues or is siloed across systems, the AI layer underperforms no matter how good the models are.\n\nRegulatory lag is a structural constraint in healthcare. AI capabilities often outpace what's permissible in clinical or regulated contexts.\n\n💡 Naming the limits is what makes this answer credible — it signals strategic maturity, not just enthusiasm."},{id:"t3q18",category:"Why Cardinal",difficulty:"Advanced",question:"You've been at Cardinal Health for years already. Why do you want to go deeper into this organization rather than taking an AI leadership role at a pure-play tech or AI company?",answer:"This is a question I've asked myself honestly, and I have a clear answer.\n\nThe value of domain depth compounds. I've spent years understanding how Cardinal Health actually works — the supply chain dynamics, the stakeholder relationships, the regulatory environment, the data architecture, the political landscape. That context is irreplaceable when you're trying to determine which AI use cases are genuinely high-value versus which ones are interesting but fragile. An AI leader coming in from outside would spend 12-18 months learning what I already know.\n\nThe problems are hard in the right way. Healthcare distribution is not a consumer internet problem — it's a complex, regulated, relationship-intensive business where the consequences of getting AI wrong include real operational risk and patient impact.\n\nThe scale of impact is real. Cardinal Health touches a significant fraction of the US healthcare supply chain. AI that works here doesn't improve one company's margins — it has the potential to improve how healthcare products reach patients and providers at a meaningful scale.\n\nAnd honestly — this specific role is the right role at the right moment. The AI CoE is at an inflection point where applied delivery needs to become a serious enterprise capability. I'm not interested in it because I can't get a role at a tech company. I'm interested in it because this is the role where I can have the most impact.\n\n💡 This answer needs to feel genuinely chosen, not consolation prize — make sure your delivery matches the conviction of the words."}]}};

// ── STATE ─────────────────────────────────────────────────────
const state={activeTab:'tab1',searchQuery:'',catFilter:{tab1:'All',tab2:'All',tab3:'All'},diffFilter:{tab1:'All',tab2:'All',tab3:'All'},reviewed:JSON.parse(localStorage.getItem('reviewed')||'{}'),favorites:JSON.parse(localStorage.getItem('favorites')||'{}'),expanded:{}};

// ── HELPERS ───────────────────────────────────────────────────
function save(){localStorage.setItem('reviewed',JSON.stringify(state.reviewed));localStorage.setItem('favorites',JSON.stringify(state.favorites));}
function getAllQ(){return[...PDF_DATA.tab1.questions,...PDF_DATA.tab2.questions,...PDF_DATA.tab3.questions];}
function getFiltered(tabId){const tab=PDF_DATA[tabId],q=state.searchQuery.toLowerCase(),cat=state.catFilter[tabId],diff=state.diffFilter[tabId];return tab.questions.filter(item=>{if(cat!=='All'&&item.category!==cat)return false;if(diff!=='All'&&item.difficulty!==diff)return false;if(q&&!item.question.toLowerCase().includes(q)&&!item.answer.toLowerCase().includes(q)&&!item.category.toLowerCase().includes(q))return false;return true;});}
function getProgress(tabId){const qs=PDF_DATA[tabId].questions,done=qs.filter(q=>state.reviewed[q.id]).length;return{done,total:qs.length,pct:qs.length?Math.round(done/qs.length*100):0};}
function getOverall(){const all=getAllQ(),done=all.filter(q=>state.reviewed[q.id]).length;return{done,total:all.length,pct:all.length?Math.round(done/all.length*100):0};}
function getFavCount(){return Object.values(state.favorites).filter(Boolean).length;}
function findTab(id){for(const[k,t]of Object.entries(PDF_DATA)){if(t.questions.find(q=>q.id===id))return k;}return'tab1';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── RENDER ────────────────────────────────────────────────────
function renderChips(tabId){
  const tab=PDF_DATA[tabId],cc=document.getElementById('cats-'+tabId),dc=document.getElementById('diff-'+tabId);
  cc.innerHTML=['All',...tab.categories].map(cat=>`<button class="chip${state.catFilter[tabId]===cat?' active':''}" data-tab="${tabId}" data-cat="${cat}" role="checkbox" aria-checked="${state.catFilter[tabId]===cat}" style="--chip-color:${tab.color}">${cat}</button>`).join('');
  dc.innerHTML=['All','Beginner','Intermediate','Advanced'].map(d=>`<button class="diff-chip${state.diffFilter[tabId]===d?' active '+d.toLowerCase():''}" data-tab="${tabId}" data-diff="${d}" role="checkbox" aria-checked="${state.diffFilter[tabId]===d}">${d}</button>`).join('');
}
function createCard(item,tabId){
  const tab=PDF_DATA[tabId],isExp=!!state.expanded[item.id],isRev=!!state.reviewed[item.id],isFav=!!state.favorites[item.id],dc=item.difficulty.toLowerCase();
  return`<article class="card${isExp?' expanded':''}" id="card-${item.id}" style="--tab-color:${tab.color}">
    <div class="card-header" role="button" tabindex="0" aria-expanded="${isExp}" onclick="toggleCard('${item.id}','${tabId}')" onkeydown="handleKey(event,'${item.id}','${tabId}')">
      <div class="card-left">
        <div class="card-meta"><span class="q-id">${item.id.toUpperCase()}</span><span class="diff-badge ${dc}">${item.difficulty}</span><span class="cat-badge">${item.category}</span></div>
        <h3 class="card-question">${esc(item.question)}</h3>
      </div>
      <div class="card-right">
        <button class="review-btn${isRev?' reviewed':''}" aria-label="${isRev?'Unmark reviewed':'Mark reviewed'}" onclick="toggleReview(event,'${item.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
        <button class="heart-btn${isFav?' faved':''}" aria-label="${isFav?'Remove favorite':'Add favorite'}" onclick="toggleFav(event,'${item.id}')"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
        <div class="chevron" aria-hidden="true"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="2 4 6 8 10 4"/></svg></div>
      </div>
    </div>
    <div class="card-body" aria-hidden="${!isExp}"><div class="card-answer"><div class="answer-divider"></div><div class="answer-label">Model Answer</div><div class="answer-text">${esc(item.answer)}</div></div></div>
  </article>`;}
function renderCards(tabId){
  const container=document.getElementById('cards-'+tabId),items=getFiltered(tabId);
  if(!items.length){container.innerHTML='<div class="no-results">No questions match your filters.</div>';return;}
  const tab=PDF_DATA[tabId],cat=state.catFilter[tabId];
  if(!state.searchQuery){
    const cats=cat==='All'?tab.categories:[cat];
    let html='';
    cats.forEach(c=>{const ci=items.filter(q=>q.category===c);if(!ci.length)return;html+=`<div class="section-header"><div class="section-title">${c}</div></div>`+ci.map(i=>createCard(i,tabId)).join('');});
    container.innerHTML=html;
  }else{container.innerHTML=items.map(i=>createCard(i,tabId)).join('');}
}
function updateProgress(){
  ['tab1','tab2','tab3'].forEach(t=>{const p=getProgress(t);document.getElementById('badge-'+t).textContent=`${p.done}/${p.total}`;});
  const o=getOverall(),ring=document.getElementById('overall-ring'),circ=2*Math.PI*18;
  ring.style.strokeDasharray=circ;ring.style.strokeDashoffset=circ*(1-o.pct/100);
  document.getElementById('overall-pct').textContent=o.pct+'%';
  const fc=getFavCount(),fel=document.getElementById('fav-count');
  fel.textContent=fc;fel.style.display=fc>0?'flex':'none';
}
function renderAll(){['tab1','tab2','tab3'].forEach(t=>{renderChips(t);renderCards(t);});updateProgress();}

// ── INTERACTIONS ──────────────────────────────────────────────
function switchTab(tabId){
  if(state.activeTab===tabId)return;state.activeTab=tabId;
  document.querySelectorAll('.tab-btn').forEach(b=>{const a=b.dataset.tab===tabId;b.classList.toggle('active',a);b.setAttribute('aria-selected',a);});
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('active',p.id==='pane-'+tabId));
}
function toggleCard(id,tabId){state.expanded[id]=!state.expanded[id];renderCards(tabId);}
function handleKey(e,id,tabId){if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleCard(id,tabId);}}
function toggleReview(e,id){e.stopPropagation();state.reviewed[id]=!state.reviewed[id];save();renderCards(findTab(id));updateProgress();}
function toggleFav(e,id){e.stopPropagation();state.favorites[id]=!state.favorites[id];save();renderCards(findTab(id));updateProgress();if(document.getElementById('fav-modal').classList.contains('open'))renderFavModal();}
function renderFavModal(){
  const body=document.getElementById('fav-modal-body'),favs=getAllQ().filter(q=>state.favorites[q.id]);
  body.innerHTML=favs.length?favs.map(i=>createCard(i,findTab(i.id))).join(''):'<div class="no-results" style="padding:40px 0">No favorites yet. Tap ❤️ on any card.</div>';
}

// ── EVENTS ────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(b=>{b.addEventListener('click',()=>switchTab(b.dataset.tab));b.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();switchTab(b.dataset.tab);}});});
document.getElementById('search-input').addEventListener('input',e=>{state.searchQuery=e.target.value.trim();renderAll();});
document.addEventListener('click',e=>{
  const chip=e.target.closest('.chip');if(chip){state.catFilter[chip.dataset.tab]=chip.dataset.cat;renderChips(chip.dataset.tab);renderCards(chip.dataset.tab);}
  const dchip=e.target.closest('.diff-chip');if(dchip){state.diffFilter[dchip.dataset.tab]=dchip.dataset.diff;renderChips(dchip.dataset.tab);renderCards(dchip.dataset.tab);}
});
document.getElementById('fav-fab').addEventListener('click',()=>{document.getElementById('fav-modal').classList.add('open');renderFavModal();});
document.getElementById('fav-modal-close').addEventListener('click',()=>document.getElementById('fav-modal').classList.remove('open'));
document.getElementById('fav-modal').addEventListener('click',e=>{if(e.target===document.getElementById('fav-modal'))document.getElementById('fav-modal').classList.remove('open');});

const manifest={name:'Interview Prep — Director Applied AI',short_name:'Interview Prep',display:'standalone',orientation:'portrait',theme_color:'#F5F5F7',background_color:'#F5F5F7',start_url:'./',icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230071E3'/%3E%3Ccircle cx='96' cy='96' r='54' fill='none' stroke='white' stroke-width='8' opacity='0.3'/%3E%3Ccircle cx='96' cy='96' r='18' fill='white'/%3E%3Cpath d='M78 72l36 24-36 24V72z' fill='white' opacity='0.8'/%3E%3C/svg%3E",sizes:'192x192',type:'image/svg+xml'}]};
const mBlob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
document.getElementById('manifest-placeholder').href=URL.createObjectURL(mBlob);
if('serviceWorker'in navigator){const swCode=`const CACHE='iv-prep-v1';self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['./',self.location.href])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));}return res;})));});`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode],{type:'text/javascript'}))).catch(()=>{});}

// ── INIT ──────────────────────────────────────────────────────
renderAll();
</script>
