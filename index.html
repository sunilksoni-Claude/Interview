  <link rel="manifest" id="manifest-placeholder">
  <style>
    :root {
      --apple-blue: #0071E3; --apple-blue-hover: #0077ED;
      --apple-black: #1D1D1F; --apple-gray-dark: #6E6E73;
      --apple-gray-light: #86868B; --apple-bg: #F5F5F7;
      --apple-white: #FFFFFF; --apple-border: rgba(0,0,0,0.08);
      --apple-shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --apple-shadow-md: 0 8px 28px rgba(0,0,0,0.08);
      --apple-shadow-lg: 0 20px 60px rgba(0,0,0,0.12);
      --tab1-color: #0071E3; --tab2-color: #5E5CE6; --tab3-color: #30D158;
      --ease-apple: cubic-bezier(0.25,0.1,0.25,1);
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--apple-bg); color: var(--apple-black);
      min-height: 100dvh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
    }
    .bg-mesh { position: fixed; inset: 0; z-index: 0; background: var(--apple-bg); overflow: hidden; }
    .bg-mesh::before {
      content: ''; position: absolute; inset: -50%;
      background:
        radial-gradient(ellipse 70% 60% at 20% 20%, rgba(0,113,227,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 70% at 80% 10%, rgba(94,92,230,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 80% 50% at 50% 80%, rgba(48,209,88,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 70%, rgba(255,149,0,0.06) 0%, transparent 60%);
      animation: meshDrift 18s ease-in-out infinite alternate;
    }
    @keyframes meshDrift {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(-3%,2%) scale(1.04); }
      66%  { transform: translate(2%,-3%) scale(0.97); }
      100% { transform: translate(-1%,1%) scale(1.02); }
    }
    #app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 16px; padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
    header {
      position: sticky; top: 0; z-index: 100;
      padding: calc(env(safe-area-inset-top) + 12px) 0 0;
      background: rgba(245,245,247,0.85);
      backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 8px 32px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.6);
      border-radius: 18px; margin-bottom: 8px;
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-brand svg { width: 32px; height: 32px; flex-shrink: 0; }
    .header-title { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; line-height: 1.2; }
    .header-sub { font-size: 0.72rem; color: var(--apple-gray-dark); font-weight: 400; }
    .overall-progress { display: flex; align-items: center; gap: 10px; }
    .progress-ring-wrap { position: relative; width: 44px; height: 44px; }
    .progress-ring-wrap svg { transform: rotate(-90deg); }
    .progress-ring-bg { fill: none; stroke: rgba(0,0,0,0.08); stroke-width: 3; }
    .progress-ring-fill { fill: none; stroke: var(--apple-blue); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.6s var(--ease-apple); }
    .progress-ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.62rem; font-weight: 700; color: var(--apple-blue); }
    .tab-bar {
      display: flex; gap: 6px; padding: 6px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 8px 32px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.6);
      border-radius: 18px; margin-bottom: 8px;
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 10px 8px; border: none; background: transparent; cursor: pointer;
      border-radius: 13px; transition: background 0.2s var(--ease-apple); position: relative; outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn:focus-visible { box-shadow: 0 0 0 3px var(--apple-blue); }
    .tab-btn.active { background: rgba(255,255,255,0.9); box-shadow: var(--apple-shadow-sm); }
    .tab-btn-icon { font-size: 1.1rem; line-height: 1; }
    .tab-btn-label { font-size: 0.65rem; font-weight: 600; color: var(--apple-gray-dark); letter-spacing: 0.01em; white-space: nowrap; transition: color 0.2s; }
    .tab-btn.active .tab-btn-label { color: var(--tab-color, var(--apple-blue)); }
    .tab-btn-badge {
      position: absolute; top: 6px; right: 6px;
      color: white; font-size: 0.55rem; font-weight: 700;
      min-width: 16px; height: 16px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; padding: 0 4px;
    }
    .search-wrap { position: relative; margin-bottom: 8px; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--apple-gray-light); pointer-events: none; }
    #search-input {
      width: 100%; padding: 12px 14px 12px 40px; font-size: 0.95rem; font-family: inherit;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 8px 32px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.6);
      border-radius: 14px; outline: none; color: var(--apple-black); transition: box-shadow 0.2s var(--ease-apple);
    }
    #search-input::placeholder { color: var(--apple-gray-light); }
    #search-input:focus { box-shadow: 0 0 0 3px rgba(0,113,227,0.2), 0 8px 32px rgba(0,0,0,0.06); }
    .chips-wrap { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 8px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .chips-wrap::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; cursor: pointer;
      border: 1.5px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); color: var(--apple-gray-dark);
      transition: all 0.18s var(--ease-apple); -webkit-tap-highlight-color: transparent;
    }
    .chip:hover { transform: translateY(-1px); box-shadow: var(--apple-shadow-sm); }
    .chip.active { background: var(--chip-color, var(--apple-blue)); border-color: transparent; color: white; box-shadow: 0 4px 12px rgba(0,113,227,0.3); }
    .diff-chips { display: flex; gap: 8px; margin-bottom: 12px; }
    .diff-chip {
      flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-size: 0.73rem; font-weight: 600; cursor: pointer;
      border: 1.5px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); color: var(--apple-gray-dark);
      transition: all 0.18s var(--ease-apple); -webkit-tap-highlight-color: transparent;
    }
    .diff-chip.active.beginner     { background: #30D158; border-color: transparent; color: white; box-shadow: 0 4px 12px rgba(48,209,88,0.3); }
    .diff-chip.active.intermediate { background: #FF9500; border-color: transparent; color: white; box-shadow: 0 4px 12px rgba(255,149,0,0.3); }
    .diff-chip.active.advanced     { background: #FF3B30; border-color: transparent; color: white; box-shadow: 0 4px 12px rgba(255,59,48,0.3); }
    .tab-pane { display: none; animation: fadeSlideIn 0.25s var(--ease-apple); }
    .tab-pane.active { display: block; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 8px 32px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.6);
      border-radius: 18px; margin-bottom: 10px; overflow: hidden;
      transition: box-shadow 0.2s var(--ease-apple), transform 0.2s var(--ease-apple);
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.6); }
    .card-header {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 16px 16px 12px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .card-left { flex: 1; min-width: 0; }
    .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .q-id { font-size: 0.65rem; font-weight: 700; color: var(--apple-gray-light); letter-spacing: 0.04em; text-transform: uppercase; }
    .diff-badge { font-size: 0.62rem; font-weight: 700; padding: 2px 8px; border-radius: 6px; letter-spacing: 0.02em; text-transform: uppercase; }
    .diff-badge.beginner     { background: rgba(48,209,88,0.15);  color: #1a8a37; }
    .diff-badge.intermediate { background: rgba(255,149,0,0.15);  color: #b36200; }
    .diff-badge.advanced     { background: rgba(255,59,48,0.15);   color: #c0392b; }
    .cat-badge { font-size: 0.62rem; font-weight: 600; padding: 2px 8px; border-radius: 6px; background: rgba(0,0,0,0.06); color: var(--apple-gray-dark); }
    .card-question { font-size: 0.93rem; font-weight: 600; line-height: 1.4; letter-spacing: -0.01em; color: var(--apple-black); }
    .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .chevron {
      width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.25s var(--ease-apple), background 0.2s; flex-shrink: 0;
    }
    .chevron svg { width: 12px; height: 12px; color: var(--apple-gray-dark); transition: color 0.2s; }
    .card.expanded .chevron { transform: rotate(180deg); background: var(--tab-color, var(--apple-blue)); }
    .card.expanded .chevron svg { color: white; }
    .heart-btn {
      width: 28px; height: 28px; border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center; border-radius: 50%;
      transition: transform 0.15s var(--ease-apple); -webkit-tap-highlight-color: transparent; padding: 0;
    }
    .heart-btn:hover { transform: scale(1.2); }
    .heart-btn svg { width: 18px; height: 18px; }
    .heart-btn.faved svg { fill: #FF3B30; stroke: #FF3B30; }
    .heart-btn:not(.faved) svg { fill: none; stroke: var(--apple-gray-light); }
    .review-btn {
      width: 28px; height: 28px; border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center; border-radius: 50%;
      transition: transform 0.15s var(--ease-apple); -webkit-tap-highlight-color: transparent; padding: 0;
    }
    .review-btn:hover { transform: scale(1.2); }
    .review-btn svg { width: 18px; height: 18px; }
    .review-btn.reviewed svg { stroke: #30D158; }
    .review-btn:not(.reviewed) svg { stroke: var(--apple-gray-light); }
    .card-body { max-height: 0; overflow: hidden; transition: max-height 0.35s var(--ease-apple); }
    .card.expanded .card-body { max-height: 9999px; }
    .card-answer { padding: 0 16px 16px; }
    .answer-divider { height: 1px; background: rgba(0,0,0,0.06); margin-bottom: 14px; }
    .answer-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--apple-gray-light); margin-bottom: 8px; }
    .answer-text { font-size: 0.88rem; line-height: 1.65; color: var(--apple-black); white-space: pre-wrap; }
    .section-header { padding: 10px 4px 6px; }
    .section-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--apple-gray-dark); }
    .no-results { text-align: center; padding: 40px 20px; color: var(--apple-gray-light); font-size: 0.9rem; }
    #fav-fab {
      position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); right: 20px; z-index: 200;
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 0 8px 28px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s var(--ease-apple), box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #fav-fab:hover { transform: scale(1.08); box-shadow: 0 12px 36px rgba(0,0,0,0.2); }
    #fav-fab svg { width: 24px; height: 24px; fill: #FF3B30; stroke: #FF3B30; }
    #fav-count {
      position: absolute; top: -2px; right: -2px;
      background: #FF3B30; color: white; font-size: 0.6rem; font-weight: 700;
      min-width: 18px; height: 18px; border-radius: 9px;
      display: none; align-items: center; justify-content: center; padding: 0 4px;
    }
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      width: 100%; max-width: 900px; max-height: 80dvh;
      background: rgba(245,245,247,0.98);
      backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%);
      border-radius: 24px 24px 0 0; box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
      display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom);
      animation: sheetUp 0.3s var(--ease-apple);
    }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: rgba(0,0,0,0.15); border-radius: 2px; margin: 12px auto 0; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; }
    .modal-title { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; }
    .modal-close { width: 28px; height: 28px; border-radius: 50%; background: rgba(0,0,0,0.08); border: none; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
    .modal-body { flex: 1; overflow-y: auto; padding: 0 16px 16px; -webkit-overflow-scrolling: touch; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }
  </style>
</head>

<script>
// ── DATA ──────────────────────────────────────────────────────
const PDF_DATA={tab1:{id:"tab1",title:"Core Interview Prep",color:"#0071E3",categories:["Role Fit","Leadership","Technical","Stakeholder","Strategy","Behavioral","Situational","Culture"],questions:[{id:"t1q1",category:"Role Fit",difficulty:"Intermediate",question:"Walk me through your background and how it prepares you for this Director, Applied AI role.",answer:"Start with your current role as Director of AI, Data Analytics & Engineering at Cardinal Health — leading a 50+ person global team across the US and India, running an AI Center of Excellence (aiQ), and driving enterprise AI adoption across business units.\n\nEmphasize three threads that map directly to this JD:\n1. You already operate in a forward-deployed model — your team embeds with stakeholders to identify, shape, and deliver AI use cases.\n2. You have deep technical depth as a player-coach — you've architected and built proofs of concept using GCP, BigQuery, Gemini, Claude, and Python alongside your teams.\n3. You've closed the loop from ideation to production and scaling — including CARA (contract intelligence), AI training programs at 250+ scale (Project Prometheus), and internal accelerator libraries.\n\nClose with why this particular role excites you: it formalizes exactly what you've been building informally — a dedicated Applied AI engine that turns field learnings into reusable enterprise capabilities.\n\n💡 Anchor to the JD language: 'builder and execution engine,' 'forward deployed,' 'reusable accelerators'. Keep to 3 minutes; invite a follow-up question at the end."},{id:"t1q2",category:"Role Fit",difficulty:"Intermediate",question:"Why are you interested in this specific role given you're already a Director of AI at Cardinal Health?",answer:"This role represents a deliberate evolution — moving from a broad platform-and-governance mandate to a focused Applied AI execution mandate. In my current role I balance platform work, governance, team management, and enablement across a large org. This role lets me go deep on what I find most energizing: partnering directly with business leaders to find high-value problems, rapid prototyping, getting solutions into production, and building reusable patterns that multiply impact.\n\nThere's also a strategic reason: the AI CoE needs a dedicated applied delivery capability that's distinct from the product roadmap owners. I want to be the person who builds that muscle at Cardinal Health — and I believe my combination of domain knowledge, technical depth, and stakeholder relationships gives me a unique head start.\n\n💡 Avoid sounding like you're escaping your current role; frame this as intentional move toward impact."},{id:"t1q3",category:"Role Fit",difficulty:"Beginner",question:"What does 'forward deployed AI' mean to you and how have you operated in that model?",answer:"Forward deployed means your team is not a request-taker sitting in a central queue — you proactively embed with business and IT stakeholders, learn their problems, co-develop solutions, prove them fast, transition them to run teams, and redeploy to the next opportunity. It's closer to a venture studio or special forces team than a traditional IT delivery org.\n\nI've operated this way with initiatives like RouteRX Pro (field sales optimization), CARA (Legal/Compliance contract intelligence), and our GitHub Copilot rollout — each time going from business problem identification to production-grade solution with a small, embedded team. The key discipline is knowing when to hand off so the team stays focused on what's unproven and most valuable next."},{id:"t1q4",category:"Leadership",difficulty:"Intermediate",question:"Tell me about your leadership philosophy for AI engineering teams.",answer:"I lead with what I call 'governance-first, delivery-forward.' Before we write a line of code, we establish shared context through architectural documents — Design.md, CLAUDE.md, SKILL.md, AGENTS.md — so every engineer on the team, whether in Ohio or Hyderabad, is building toward the same standard.\n\nOn the human side, I believe in player-coach leadership: I stay technically credible enough to review architecture, prototype alongside the team, and unblock decisions — but I grow people by giving them ownership, not by doing their jobs for them. I run structured 1:1s, connect individual growth goals to team outcomes, and create internal recognition mechanisms like our AI Shark Tank innovation event.\n\nFor a matrixed team with offshore partners (Genpact, Accenture) and vendors, I emphasize clarity of ownership, explicit handshake points, and momentum — removing blockers fast rather than letting dependencies linger.\n\n💡 This role leads AI engineers AND engineering managers — mention both levels explicitly."},{id:"t1q5",category:"Leadership",difficulty:"Advanced",question:"Describe a time you developed a high-performing AI team from the ground up or significantly elevated one.",answer:"When I built the aiQ AI Center of Excellence at Cardinal Health, the team existed in name only — no repeatable delivery model, no shared tooling, no governance framework. I established three foundational pillars:\n1. A persona and accelerator library (NotebookLM agents, prompt libraries, reusable SKILL.md patterns) so teams weren't starting from zero.\n2. A structured upskilling program — Project Prometheus — that trained 250+ employees across all levels in practical AI use.\n3. An AI Shark Tank event that surfaced the best internal ideas and funded the strongest ones.\n\nWithin [X months] the team moved from ad-hoc experimentation to a portfolio of production solutions with measurable business impact. Engineer retention improved because people were doing work that mattered and getting recognized for it.\n\n💡 Quantify: how many engineers, what was velocity improvement, what shipped?"},{id:"t1q6",category:"Leadership",difficulty:"Advanced",question:"How do you coordinate matrixed offshore teams, contractors, and vendors on high-priority AI initiatives?",answer:"The failure mode for matrixed delivery is ambiguity — everyone thinks someone else owns the blocker. My approach: explicit RACI at the initiative level, not the project level; weekly synchronization cadences between onshore leads and offshore delivery managers; and a shared 'source of truth' architecture document (CLAUDE.md / AGENTS.md pattern) that every team member regardless of vendor can reference.\n\nFor offshore partners like Genpact and Accenture I've learned to be very specific in task definitions — not 'build an AI pipeline' but 'implement this schema, use this prompt template, call this endpoint, return this output format.' I also build in daily async status checks and escalation paths so blockers surface within hours, not at the end of a sprint."},{id:"t1q7",category:"Leadership",difficulty:"Advanced",question:"Tell me about a time you had to give difficult feedback to a senior engineer or team lead.",answer:"I had a senior engineer on my team who was technically excellent but was consistently taking on too much individual contribution instead of reviewing and multiplying the team's output. In a 1:1 I was direct: 'Your ceiling here is not determined by what you can build — it's determined by how much you can accelerate others.' I gave specific examples of moments where his deep dive into code had displaced his team leadership obligations.\n\nWe co-created a 90-day plan where I defined concrete expectations for code review throughput, architecture guidance, and junior engineer mentoring. I checked in bi-weekly. Within the quarter his behavior shifted significantly and his team's velocity improved noticeably. He later told me that conversation was the most important career feedback he'd received.\n\n💡 STAR format; emphasize the follow-up and the outcome, not just the feedback conversation."},{id:"t1q8",category:"Technical",difficulty:"Advanced",question:"Describe your hands-on experience with GCP, Vertex AI, and the Gemini suite.",answer:"I use GCP as my primary cloud platform for AI workloads. For data engineering: BigQuery as the analytical core, with Databricks for large-scale ML pipelines. For AI/ML: I've built and deployed solutions using Vertex AI for model serving and Gemini Pro and Gemini Enterprise for enterprise GenAI use cases — including document intelligence (CARA), automated reporting, and deep research workflows.\n\nMy practical experience includes architecting a Gemini Enterprise + Python hybrid for automated PowerPoint generation, building prompt libraries that call the Gemini API with structured JSON outputs, and evaluating Gemini versus Claude versus GPT-4 for specific use cases on our platform. I'm not just familiar with these services as a consumer — I can architect solutions, prototype them, and guide engineers on best practices.\n\n💡 If asked to go deeper: Vertex AI Pipelines, Gemini grounding via Google Search, Vertex Agent Builder."},{id:"t1q9",category:"Technical",difficulty:"Advanced",question:"How do you approach prototyping and validating an AI use case before committing to full production build?",answer:"I follow a three-gate process: Feasibility → Proof of Concept → Production Readiness.\n\nIn Feasibility (1-2 weeks): I work directly with the business stakeholder to define the problem precisely, identify the data available, and assess whether the AI approach is technically viable. I often build a notebook prototype myself to test the core hypothesis.\n\nIn PoC (2-6 weeks): Small team, minimum viable solution, real data. We optimize for learning velocity not code quality. We instrument success metrics from day one — not as an afterthought.\n\nProduction Readiness gate: Does it meet responsible AI, security, and governance standards? Can it be supported by a run team? Is the accuracy sufficient for the business decision it's informing?\n\nI've used this model for CARA, for our GitHub Copilot deployment playbook, and for our internal AI agent library."},{id:"t1q10",category:"Technical",difficulty:"Advanced",question:"What is your experience with agentic AI and LLM-based systems? What design patterns do you apply?",answer:"I've built and guided multiple agentic AI systems. Key patterns I apply:\n\nContext management: I treat context windows as working memory that must be managed deliberately. For enterprise agents this means CLAUDE.md / system prompt hierarchies that inject the right context for each task.\n\nTool-use architecture: For agents that need to act (not just respond), I design minimal tool sets — the fewer tools, the more reliable the agent. Each tool has a clear schema, error handling, and fallback.\n\nPrompt caching and cost governance: For production agents I instrument token usage and apply caching strategies to reduce cost by 40-60% at scale.\n\nHuman-in-the-loop checkpoints: For high-stakes decisions (like contract risk flagging in CARA), I never let the agent act autonomously — it surfaces recommendations for human review.\n\nI'm deeply familiar with Claude's agentic patterns, Gemini's function calling, and GitHub Copilot's agent mode.\n\n💡 CARA is your strongest real example — lead with it if asked for a specific agentic system."},{id:"t1q11",category:"Technical",difficulty:"Advanced",question:"How do you evaluate and select AI models for specific enterprise use cases?",answer:"I evaluate across five dimensions:\n1. Accuracy on task — I run structured evals with domain-specific test sets, not just generic benchmarks.\n2. Cost at scale — what is the token cost for this use case at production volume?\n3. Latency requirements — is this a synchronous user-facing interaction or an async batch process?\n4. Data privacy and compliance — can we send this data to a third-party API or do we need on-prem/private deployment?\n5. Integration fit — does this model work within our existing GCP/Azure ecosystem?\n\nFor example, I chose Claude for certain document intelligence tasks because its large context window and instruction-following accuracy outperformed alternatives on our internal test data. I chose Gemini Enterprise for use cases requiring Google Workspace integration. Model selection is always use-case specific."},{id:"t1q12",category:"Technical",difficulty:"Advanced",question:"How do you ensure responsible AI, data privacy, and governance in solutions you ship?",answer:"Governance is not a checkpoint at the end — it's a design constraint from the beginning. My approach:\n\nBefore build: I require a 'responsible AI brief' for every initiative — data lineage, bias risk assessment, privacy classification of inputs and outputs, and regulatory considerations (HIPAA for healthcare data at Cardinal Health).\n\nDuring build: I enforce separation of concerns — PII scrubbing before LLM calls, audit logging of AI decisions, and no model training on production customer data without explicit approval.\n\nAfter launch: I partner with our AI Governance and Risk teams to complete review processes. I've learned to engage them early as collaborators, not as gate-keepers, which dramatically speeds up approval timelines."},{id:"t1q13",category:"Stakeholder",difficulty:"Intermediate",question:"Walk me through how you identify and prioritize high-value AI use cases with business stakeholders.",answer:"I use a three-lens framework: Value (what is the business impact — cost reduction, revenue, risk, patient/customer experience?), Feasibility (do we have the data, the AI capability, and the engineering capacity?), and Risk (regulatory exposure, data sensitivity, and failure modes if the AI gets it wrong?).\n\nMy process starts with structured discovery sessions with business and IT leaders. I come prepared with a domain map — where in this business unit does intelligence amplify human decisions? I ask 'what would you do differently if you knew X?' to uncover high-leverage information gaps.\n\nI then stack-rank with a simple scoring matrix and bring the top three to the AI CoE portfolio review. This avoids the 'highest HiPPO wins' failure mode and creates a transparent, defensible prioritization.\n\n💡 Memorize: Value · Feasibility · Risk — the three lenses. Use them explicitly in your answer."},{id:"t1q14",category:"Stakeholder",difficulty:"Advanced",question:"Give an example of when you had to build a business case and secure executive funding for an AI initiative.",answer:"For CARA — our contract intelligence agent for Legal and Compliance — I built the full business case including: estimated attorney hours saved per contract review cycle, risk exposure reduction from missed clause detection, and a 3-year TCO vs. vendor alternative comparison.\n\nI presented this to the VP of Legal and the CTO in a 20-minute executive brief. I led with the risk angle (missed contract obligations had caused real write-offs in prior years), then showed the AI solution's accuracy on a held-out test set of 50 contracts, and closed with the investment ask and payback timeline.\n\nThe initiative was funded in the same quarter. Key lesson: executives fund solutions to problems they already care about — find the pain first, then show the AI as the answer.\n\n💡 Have 2-3 specific financial numbers ready: hours saved, cost avoided, risk reduced."},{id:"t1q15",category:"Stakeholder",difficulty:"Intermediate",question:"How do you translate complex AI concepts into practical guidance for business and IT leaders?",answer:"I use three techniques: analogies, demos, and outcomes — in that order.\n\nAnalogies: I rarely explain how a large language model works. Instead I say: 'Think of it as a very well-read analyst who has read every contract in your library and can answer questions about it instantly — but needs a human to make the final call.'\n\nDemos: Nothing builds stakeholder confidence like showing a working prototype on their actual data. I almost always bring a notebook or a simple UI to the first executive meeting.\n\nOutcomes: I anchor every technical discussion to a business metric. Not 'we achieved 92% F1 score' but 'our model catches 9 out of 10 compliance issues that the current manual review misses, reducing your exposure by an estimated $X per quarter.'"},{id:"t1q16",category:"Stakeholder",difficulty:"Intermediate",question:"How do you handle a stakeholder who is skeptical or resistant to AI adoption?",answer:"I've encountered this many times. My approach: don't argue with the skepticism — diagnose it.\n\nSkepticism usually comes from one of three places: fear of job displacement, past experience with AI projects that overpromised and underdelivered, or legitimate concern about data quality or regulatory risk.\n\nOnce I understand the root cause, I tailor my response. For fear of displacement: I reframe AI as 'I want your team to spend less time on X so they can spend more time on Y' — and I make that concrete. For past failures: I show them our delivery model (PoC-gated, success-metric-first) that's designed to avoid those traps. For legitimate risk concerns: I bring the governance team into the conversation early and let them validate our controls."},{id:"t1q17",category:"Strategy",difficulty:"Advanced",question:"What is your vision for what an AI Center of Excellence should deliver at an enterprise like Cardinal Health?",answer:"An AI CoE should be the organization's immune system against AI fragmentation — preventing every team from reinventing the wheel while enabling every team to move fast. I see three core functions:\n\n1. Applied AI delivery: The forward-deployed team that solves the highest-value problems across business units, turning those learnings into reusable patterns and accelerators.\n2. Enablement and capability building: Training programs, prompt libraries, internal tools, and certifications that multiply the AI capability of every employee — not just the data science team.\n3. Governance and trust: The body that ensures every AI solution meets responsible AI, security, and compliance standards — operating as a partner to speed up good solutions, not just a gate to slow down risky ones."},{id:"t1q18",category:"Strategy",difficulty:"Advanced",question:"How do you balance building reusable enterprise capabilities versus delivering fast for individual stakeholders?",answer:"This tension is real and I manage it explicitly. My rule: every initiative must pay two dividends — the business value it delivers for the immediate stakeholder, and the reusable artifact it leaves behind for the next team.\n\nIn practice:\n1. When I select an AI use case, I bias toward ones that will generate reusable patterns — a document intelligence solution built for Legal becomes the template for HR and Finance.\n2. I staff initiatives with one 'build' engineer (focused on delivery speed) and one 'platform' engineer (focused on extraction and generalization).\n3. I maintain an accelerator backlog — after every initiative, we refactor the reusable components into the library."},{id:"t1q19",category:"Strategy",difficulty:"Intermediate",question:"How do you measure the success of an AI Center of Excellence? What metrics do you track?",answer:"I track metrics at three levels:\n\nInitiative level: Business impact per use case — productivity hours saved, cost avoided, revenue enabled, risk reduced. I establish baseline metrics before every build.\n\nPortfolio level: Number of use cases proven in PoC, number transitioned to production, number scaled to additional business units. Adoption rate of reusable accelerators across teams, and reduction in duplicate AI efforts enterprise-wide.\n\nCapability level: AI literacy scores across the employee base, number of active AI practitioners trained, quality and usage of the internal accelerator library."},{id:"t1q20",category:"Strategy",difficulty:"Advanced",question:"Where do you see enterprise AI heading in the next 2-3 years and how should Cardinal Health position itself?",answer:"Three shifts are happening simultaneously:\n1. Agentic AI is moving from experimental to production — systems that can take multi-step actions across enterprise tools, not just answer questions.\n2. AI is becoming embedded in every software product — this means AI engineering discipline must permeate every delivery team.\n3. The governance and trust gap is widening — organizations that invest in responsible AI infrastructure now will move faster in 18-24 months because they won't be constantly hitting regulatory walls.\n\nFor Cardinal Health specifically: the combination of healthcare domain knowledge, rich data assets, and an established AI CoE is a genuine competitive advantage — but only if we move from experimentation to scaled production faster than competitors."},{id:"t1q21",category:"Behavioral",difficulty:"Advanced",question:"Tell me about a time you took a proof of concept into production and drove broad adoption.",answer:"Situation: Our GitHub Copilot pilot started as a 5-person experiment with my core engineering team. The hypothesis was that AI-assisted coding could meaningfully improve velocity without sacrificing code quality.\n\nTask: Validate the ROI, develop a governance model for enterprise rollout, and scale adoption across a 50+ person team including offshore partners.\n\nAction: I built a cost-governance framework around the new AI Credits billing model, created a model-selection guide mapping task types to optimal Copilot models, developed a SKILL.md-style prompt hygiene guide for the team, and ran a structured 8-week rollout with weekly adoption metrics. I personally led training sessions and created internal documentation.\n\nResult: Adoption reached [X]% of the engineering team within [Y] weeks. The governance framework I built became the Cardinal Health standard for AI developer tool deployment.\n\n💡 Fill in your actual metrics before the interview — this story needs numbers to land."},{id:"t1q22",category:"Behavioral",difficulty:"Advanced",question:"Describe a time you had to pivot an AI initiative that wasn't delivering expected results.",answer:"Situation: An early ML model we built for inventory optimization was technically performing well (good validation metrics) but wasn't being used by the operations team.\n\nTask: Understand why adoption had failed and either fix it or cut the initiative.\n\nAction: I went back to basics — sat with the operations team for a full day to watch how they actually made decisions. I discovered two problems: the model output timing didn't align with their daily decision window, and the output format (a CSV report) didn't integrate into their existing workflow tool. I reprioritized the team to build a lightweight Tableau embed that surfaced the recommendation inside their existing dashboard and adjusted the pipeline schedule to run 2 hours before their morning standup.\n\nResult: Adoption jumped from near-zero to daily active use within three weeks. This experience permanently changed how I run discovery sessions — I now require a 'day in the life' session with the end user before finalizing any solution design."},{id:"t1q23",category:"Behavioral",difficulty:"Advanced",question:"Give an example of when you had to manage competing priorities across multiple high-value AI initiatives.",answer:"Situation: Last year I was simultaneously managing the CARA contract intelligence build, a Gemini Enterprise rollout for automated reporting, and the Project Prometheus AI training program — all with overlapping timelines and shared team resources.\n\nTask: Deliver all three without burning out the team or compromising quality.\n\nAction: I ran a portfolio triage session and scored each initiative on business value, timeline sensitivity, and resource dependency. CARA got protected resources (highest executive visibility, tightest compliance deadline). The Gemini rollout was moved to a 3-week delay with explicit stakeholder communication. Prometheus was sequenced to use team capacity in non-peak delivery windows. I also made the tradeoffs visible to my executive sponsor as a strategic partnership.\n\nResult: All three delivered within the revised plan. The portfolio triage model is now our standard quarterly planning ritual."},{id:"t1q24",category:"Behavioral",difficulty:"Advanced",question:"Tell me about a time you championed an AI initiative that faced organizational resistance.",answer:"Situation: When I proposed building CARA — an AI agent to assist Legal with contract review — the initial reaction from the General Counsel's team was skeptical bordering on hostile. Their concern: 'AI will give us wrong answers and we'll miss contract obligations.'\n\nAction: Rather than defending the technology, I proposed a bounded pilot: 50 historical contracts where we already knew the outcomes. I also invited the Legal team's senior paralegal to co-design the evaluation criteria.\n\nThe pilot showed 91% agreement with attorney review on clause identification. More importantly, the paralegal who co-designed the eval became our internal champion.\n\nResult: Full project approved. CARA is now used in live contract workflows. The lesson: when facing resistance, create a data experiment together, not a debate."},{id:"t1q25",category:"Behavioral",difficulty:"Advanced",question:"Describe a situation where you had to make a high-stakes technical decision with incomplete information.",answer:"Situation: Early in our BigQuery migration from SAP HANA, we hit an architectural decision point with a hard deadline: commit to a streaming ingestion architecture or batch — each had significant downstream implications and the team was split.\n\nAction: I ran a rapid spike — had two engineers prototype both approaches against our most demanding data pipeline for 48 hours. I also consulted a Google Cloud architect externally and reviewed Cardinal Health's 18-month data volume projections.\n\nI made the call to go streaming for the core transactional pipelines and batch for historical loads — a hybrid that neither camp had initially proposed. I documented the decision rationale, the assumptions it rested on, and the conditions that would trigger a revisit.\n\nResult: The architecture has held through [X] months in production. The decision log has been referenced by two other teams facing similar choices.\n\n💡 This question tests intellectual humility — include what you didn't know and how you accounted for that."},{id:"t1q26",category:"Situational",difficulty:"Advanced",question:"You've just started in this role. How do you spend your first 90 days?",answer:"Days 1-30 (Listen and Map): I schedule 1:1s with every business unit leader and key IT stakeholder. My goal is a heat map: where are the highest-value unmet AI needs, what's already in flight, what has failed and why. I also do a deep audit of the current AI CoE delivery portfolio and governance posture.\n\nDays 31-60 (Quick Win + Foundation): I identify one high-visibility use case I can move meaningfully forward in 60 days — not to prove myself, but to demonstrate the team's operating model and build early credibility. Simultaneously, I establish the team's delivery framework.\n\nDays 61-90 (Portfolio + Stakeholder Alignment): I present a prioritized 12-month applied AI roadmap to the Head of AI CoE and key executive sponsors. I align on success metrics, resource requirements, and governance protocols. I also set up a monthly AI leadership forum.\n\n💡 Structure your 30-60-90 explicitly; interviewers love this framework for leadership roles."},{id:"t1q27",category:"Situational",difficulty:"Intermediate",question:"A business unit comes to you with 10 AI use case ideas and wants all of them delivered in 6 months. How do you respond?",answer:"I would not say yes, and I would not say no. I would say: 'Let's prioritize together.'\n\nFirst, I'd apply the Value-Feasibility-Risk scoring framework to all 10 ideas — ideally in a half-day working session with the business unit's leadership team. This creates shared understanding of the tradeoffs.\n\nI'd be transparent about team capacity: 'With our current team configuration, we can deeply deliver 2-3 initiatives in 6 months with production-quality results, or we can run shallow pilots on 6-7 that won't be ready for broad adoption.' Most stakeholders, when shown the tradeoffs, choose depth over breadth.\n\nI'd also look for opportunities to resequence: some use cases might share a data foundation or capability that can be built once and reused."},{id:"t1q28",category:"Situational",difficulty:"Advanced",question:"A high-priority AI initiative is three weeks from launch and you discover a significant data quality issue that could invalidate the model's outputs. What do you do?",answer:"I surface it immediately — to my team, to the business stakeholder, and to my executive sponsor. Hiding a material risk three weeks from launch is not an option.\n\nMy immediate actions:\n1. Quantify the impact — is this a 'model is completely unreliable' problem or a 'model accuracy degrades in specific edge cases' problem? The response is very different.\n2. If the data issue is fixable, estimate the remediation timeline and assess whether a partial launch (on clean data segments) is viable.\n3. If the model is fundamentally compromised, recommend a delay and present a corrective action plan with a revised launch date.\n\nThe stakeholder conversation: I lead with the risk, not the delay. I never come empty-handed — I always bring a proposed path forward."},{id:"t1q29",category:"Situational",difficulty:"Intermediate",question:"Two senior members of your team have a significant disagreement about the technical architecture of a production AI system. How do you resolve it?",answer:"First, I make sure the disagreement is actually about technical merit and not about ego or territory.\n\nMy resolution process:\n1. I ask each engineer to write up their position in a shared document — not their preference, but their analysis of the tradeoffs.\n2. I facilitate a structured comparison session: what are the evaluation criteria (performance, cost, maintainability, team skill set), and how does each approach score?\n3. If we reach consensus — great. If we don't, I make the call, document the rationale, and make it clear the decision is mine to own.\n\nWhat I don't do: let the debate drag on indefinitely, or split the difference to keep everyone happy. Architectural ambiguity is technical debt. A clear decision — even an imperfect one — is almost always better than prolonged indecision."},{id:"t1q30",category:"Situational",difficulty:"Advanced",question:"How would you approach building an AI solution in a highly regulated environment like healthcare?",answer:"Healthcare AI has three constraints that don't exist in most domains: PHI/HIPAA data obligations, clinical risk tolerance (errors can harm patients), and heavily scrutinized vendor approval processes.\n\nMy approach:\n1. Data architecture first — I design the data flow before the AI model. Where does PHI touch the system? What is scrubbed before it reaches an LLM API call?\n2. Human-in-the-loop by default — AI recommendations should augment human clinical or operational decisions, not replace them.\n3. Regulatory alignment from day one — I engage compliance, legal, and security before the PoC, not after. This adds 2-3 days of setup time but saves weeks of post-build remediation.\n4. Bias and fairness auditing — I require demographic fairness analysis for any model that could affect patient outcomes."},{id:"t1q31",category:"Culture",difficulty:"Intermediate",question:"How do you build a culture of AI experimentation and continuous learning in an engineering team?",answer:"Three things I've done that actually work:\n\nFirst, psychological safety for failure: I publicly celebrate intelligent failures — experiments that taught us something, not just the ones that succeeded. Our AI Shark Tank event was designed explicitly to fund experiments, not just proven ideas.\n\nSecond, structured time to learn: I protect 10-15% of each engineer's time for exploration — reading papers, building personal AI projects, experimenting with new tools.\n\nThird, internal knowledge sharing infrastructure: I've built a prompt library, a NotebookLM agent framework, a SKILL.md pattern library, and internal Viva Engage communities where teams share what they're learning. Knowledge that stays in one person's head doesn't compound."},{id:"t1q32",category:"Culture",difficulty:"Intermediate",question:"How do you approach AI upskilling across a large, diverse organization — not just the technical team?",answer:"The key insight is that you need different interventions for different populations. My framework (Project Prometheus at Cardinal Health):\n\nExecutives: Half-day AI fluency sessions focused on opportunity identification and risk. Not 'how does a transformer work' but 'here is how you evaluate an AI investment proposal.'\n\nBusiness analysts and domain experts: Hands-on workshops with the AI tools they'll actually use — Microsoft Copilot, NotebookLM, custom agents. I give them a real problem from their own work and have them solve it with AI during the session.\n\nEngineers: Deep technical upskilling — prompt engineering, agentic patterns, evaluation frameworks, responsible AI implementation.\n\nI've trained 250+ employees across these tiers. The most important metric isn't training completion rate — it's the number of people who come back with a use case idea within 90 days of training."},{id:"t1q33",category:"Culture",difficulty:"Intermediate",question:"What do you think differentiates a good AI leader from a great one?",answer:"A good AI leader knows the technology and delivers projects. A great AI leader shapes the organization's relationship with AI itself.\n\nThe difference shows up in three ways:\nFirst, great AI leaders think in systems — they ask not just 'how do we solve this problem' but 'how do we build the capability to solve this class of problem forever.'\nSecond, they earn trust with non-technical stakeholders by making AI legible and approachable — they translate without condescending.\nThird, they govern their own enthusiasm — AI leaders who hype every capability or promise more than the technology can reliably deliver destroy trust.\n\nI'd also add: the greatest AI leaders develop other AI leaders. If the capability lives only in you, you've built a dependency, not an organization."}]},tab2:{id:"tab2",title:"Supplement: Governance, Selling AI & Influence",color:"#5E5CE6",categories:["AI Governance","Selling AI","Influencing"],questions:[{id:"t2q1",category:"AI Governance",difficulty:"Advanced",question:"How do you design AI governance into a solution from the start rather than bolting it on at the end?",answer:"Governance bolted on at the end is theater. Governance built in from the start is architecture.\n\nMy approach begins at the use case definition stage with a Responsible AI Brief — a one-page document every initiative must complete before we write a line of code. It answers: What data is used and what is its sensitivity classification? Who is affected by this AI's decisions — and could any group be disproportionately harmed? What is the failure mode if the model is wrong? What human review or override mechanism exists? Who is accountable for the AI's behavior in production?\n\nThis brief is not a compliance form — it's a design constraint document. It shapes the architecture before we build: which data flows through which boundary, what gets logged, where human review is inserted.\n\nDuring build, I enforce specific technical controls: PII scrubbing before LLM API calls, structured logging of all AI decisions with input/output pairs, model evaluation against bias metrics alongside accuracy metrics, and an explicit 'AI label' in any user-facing output.\n\nAt launch, I require a production readiness review with Security, Privacy, and Legal before any AI system touches live data at scale.\n\n💡 Name the 'Responsible AI Brief' as your artifact — it signals process maturity. HIPAA is directly relevant at Cardinal Health; mention it explicitly."},{id:"t2q2",category:"AI Governance",difficulty:"Advanced",question:"What are the biggest AI governance risks you've seen in enterprise AI programs, and how do you mitigate them?",answer:"Five risks I've encountered directly:\n\n1. Shadow AI: Teams using consumer AI tools (ChatGPT, personal Copilot subscriptions) on sensitive business data without IT or security awareness. Mitigation: create sanctioned, governed alternatives that are easy to use and govern access at the identity layer. We solved this at Cardinal Health by making Gemini Enterprise and GitHub Copilot available through managed accounts.\n\n2. Accuracy overconfidence: Business stakeholders treating AI outputs as ground truth. Mitigation: every AI-generated output carries uncertainty signals — confidence scores, data freshness indicators, or explicit 'AI recommendation — verify before acting' labels.\n\n3. Model drift without detection: A model that was accurate at launch silently degrades. Mitigation: production monitoring with drift alerts and scheduled revalidation cadences. Every model we ship has a defined retraining trigger.\n\n4. Vendor lock-in masquerading as governance: Companies that outsource governance to their AI vendor's terms of service. Mitigation: we maintain our own governance posture independent of vendor commitments.\n\n5. Governance theater: Long checklists that create the appearance of oversight without real risk reduction. Mitigation: proportional controls focused on high-stakes, high-volume, or patient-facing decisions.\n\n💡 'Shadow AI' is extremely relevant at Cardinal Health right now — it signals current awareness."},{id:"t2q3",category:"AI Governance",difficulty:"Advanced",question:"How do you navigate AI governance review processes without slowing down delivery momentum?",answer:"The root cause of governance slowing delivery is almost always late engagement — the team builds for 8 weeks, then drops the solution on Legal and Security's desk expecting a fast review. That never works.\n\nMy discipline: I treat governance teams as project stakeholders from day one. In the Feasibility phase I schedule a 30-minute briefing with Security, Privacy, and Legal to say: 'Here is what we're planning to build, here is the data it will touch, here are the risk areas we've already identified — what are your concerns?' This surfaces blockers in week one, not week eight.\n\nI've also built a 'governance runway' for recurring patterns. If we've already reviewed and approved a document intelligence use case with a specific data classification, the next use case with the same pattern doesn't start from zero — we reference the prior approval and delta-review only the novel elements. This reduced our review cycle from 6 weeks to under 2 for standard patterns.\n\n💡 'Governance runway' and 'delta-review' are strong vocabulary signals — use them."},{id:"t2q4",category:"AI Governance",difficulty:"Intermediate",question:"How do you handle a situation where a business stakeholder wants to move faster than your governance process allows?",answer:"I've lived this tension many times and my response is always the same: I make the risk visible, not the rule.\n\nI don't say 'we can't do that because policy says X.' I say: 'If we skip the privacy review and this solution has a data exposure issue, here is specifically what that means for Cardinal Health — regulatory exposure, patient trust, potential fines, and reputational cost.'\n\nI then propose a risk-proportional alternative: Can we run the pilot on a smaller, less sensitive dataset while the governance review proceeds in parallel? Can we bring the Legal review forward by scheduling it this week? Can we deploy with tighter access controls initially and broaden after approval?\n\nI've found that business leaders who push for speed are almost never opposed to governance — they're opposed to unnecessary delay.\n\n💡 Never frame this as 'rules vs. speed' — frame it as 'responsible speed vs. reckless speed'."},{id:"t2q5",category:"AI Governance",difficulty:"Advanced",question:"How do you approach AI fairness and bias in a healthcare context?",answer:"In healthcare, AI bias isn't an abstract ethics concern — it's a patient safety and regulatory issue.\n\nMy approach has three components:\n\nFirst, disaggregated evaluation: I require that every model be evaluated not just on aggregate accuracy but on performance across demographic subgroups — age, gender, race/ethnicity where that data is available. If we don't look for disparity, we won't find it until it causes harm.\n\nSecond, training data auditing: I examine the composition of training data for systematic gaps. Fixing the data is preferable to trying to debias the model after the fact.\n\nThird, escalation protocol: If a model shows statistically significant performance disparity across a protected class during evaluation, it does not ship without explicit sign-off from Legal, Compliance, and a clinical stakeholder — regardless of business pressure. This is a non-negotiable gate."},{id:"t2q6",category:"AI Governance",difficulty:"Intermediate",question:"What does 'responsible AI' mean to you in practice — not just in principle?",answer:"'Responsible AI' in principle is easy — everyone agrees AI should be fair, transparent, and safe. In practice it means making hard tradeoffs and building specific mechanisms.\n\nTo me, responsible AI in practice means five concrete things:\n\nOne: Every person affected by an AI decision has a meaningful way to understand and contest it — a real explainability layer and an escalation path.\n\nTwo: The AI is never the last line of defense. We design systems where a human can catch AI errors before they cause irreversible harm.\n\nThree: We monitor for harm after launch, not just before. Responsible AI is a production discipline, not just a pre-launch checklist.\n\nFour: We are honest about what the AI can and cannot do — I've killed projects that were technically impressive but not reliable enough to be safely deployed.\n\nFive: The teams building the AI reflect on who is affected by it. 'Who benefits from this model, who could be harmed by it, and do we have adequate representation of those populations in our evaluation process?'"},{id:"t2q7",category:"Selling AI",difficulty:"Advanced",question:"How do you make the business case for a major AI investment to a C-suite audience?",answer:"The mistake most AI leaders make in executive presentations is leading with the technology. I lead with the pain.\n\nMy structure for a C-suite AI business case:\nSlide 1 — The burning problem: A specific, quantified business problem. Not 'we have inefficiencies' but 'contract review delays cost Legal an estimated $X in attorney hours annually, and we missed three renewal deadlines last year with $Y in potential revenue impact.'\nSlide 2 — The AI solution: Specifically what we will build, what it will do, and what it will not do. A 60-second live demo if possible.\nSlide 3 — The evidence: Results from our proof of concept on your actual data.\nSlide 4 — The investment: What it costs, what the team looks like, the delivery timeline in ranges, not point estimates.\nSlide 5 — The return: Expected ROI — conservative, base, and optimistic scenarios tied to operational metrics they already track.\nSlide 6 — The ask: Sponsorship, budget, and stakeholder introductions.\n\nI end every pitch with the 'inaction cost' — not just what the AI saves, but what we lose for every quarter we don't act.\n\n💡 For Cardinal Health: always connect to patient outcomes or operational margin. Practice delivering this in 15 minutes."},{id:"t2q8",category:"Selling AI",difficulty:"Intermediate",question:"How do you translate AI technical concepts into language that resonates with business executives?",answer:"I use three translation techniques consistently:\n\nFirst, the 'brilliant intern' framing: I describe AI as a very capable intern who has read every document in your library and can answer questions instantly — but who needs a manager to make the final call. This sets appropriate expectations about capability and human oversight in one image.\n\nSecond, analogies to things they already fund: When I pitch a predictive AI, I say 'think of this like the credit scoring model your finance team already uses — except instead of predicting payment risk, it's predicting supply chain disruption risk.'\n\nThird, outcome-first framing: I never say 'the model achieves 94% precision.' I say 'for every 100 contracts this reviews, it correctly flags 94 compliance issues that the current process misses — and the 6 it misses are caught in the human review step we've designed as a safety net.'\n\n💡 Have 3 go-to analogies memorized: one for GenAI, one for predictive ML, one for AI agents."},{id:"t2q9",category:"Selling AI",difficulty:"Advanced",question:"An executive asks you: 'What is the ROI of AI?' How do you respond?",answer:"I don't answer that question directly — because it's the wrong question, and giving a number without context erodes credibility. I reframe it.\n\nMy response: 'The ROI of AI as a category is like asking the ROI of software — it completely depends on what problem you're solving and how well the solution is executed. What I can tell you is the ROI of specific AI applications we've already proven.'\n\nThen I pivot to concrete examples from CARA and GitHub Copilot with specific percentages and payback timelines.\n\nIf they press for a portfolio number: 'Across the AI initiatives we've completed, we're seeing returns in the range of 3:1 to 8:1 on invested capital, depending on the use case complexity and scale of adoption. The highest-return use cases are those with high-volume, repetitive decisions and good quality data.'\n\n💡 Never give an ROI number you can't defend with a specific calculation — CFOs will ask for the model."},{id:"t2q10",category:"Selling AI",difficulty:"Intermediate",question:"How do you handle an executive who says 'we tried AI two years ago and it didn't work'?",answer:"This objection is the most important one to handle well, because it's legitimate. Past AI failures are real, and dismissing them signals immaturity.\n\nMy response has four steps:\n\nFirst, I acknowledge the experience without defending AI generically: 'That's a completely fair concern, and I'd rather understand what happened than try to convince you the outcome would be different this time.'\n\nSecond, I diagnose the past failure — because AI projects fail for predictable, fixable reasons: unclear success criteria, poor data quality, stakeholder misalignment, or solutions that weren't designed for adoption.\n\nThird, I show what's different now — and only if something genuinely is different.\n\nFourth, I propose a bounded, low-risk proof point: 'I'd like to earn your confidence with a 6-week pilot on one specific problem — with clear success criteria we agree on in advance. If we hit them, we discuss scaling. If we don't, we learn why.'"},{id:"t2q11",category:"Selling AI",difficulty:"Advanced",question:"How do you present AI strategy to a board or senior leadership team that has varying levels of AI sophistication?",answer:"Presenting to a mixed-sophistication audience is a design problem, not a content problem.\n\nMy structure for a board-level AI update:\n\nOpening — Strategic position (for everyone): Where Cardinal Health stands relative to competitors and what our strategy is.\n\nMiddle — Portfolio with proof (for business leaders): The three AI initiatives generating measurable results, with business impact in terms they track. One visual — a simple chart of value delivered vs. investment.\n\nDepth — Available on request (for the technically curious): 'I'm happy to go deeper on how any of these work. I've prepared a technical appendix for those interested.'\n\nClosing — The ask and the outlook: What I need to continue, and what they can expect in the next 12 months.\n\nWhat I never do in a board presentation: use AI jargon (LLM, RAG, fine-tuning), show model architecture diagrams, or lead with technology instead of outcomes."},{id:"t2q12",category:"Selling AI",difficulty:"Advanced",question:"How do you build and maintain a pipeline of AI initiatives that keeps leadership continuously engaged and investing?",answer:"Continuous executive investment in AI requires a continuous experience of value — not just an annual strategy deck.\n\nI maintain executive engagement through three mechanisms:\n\nFirst, a quarterly AI value report: A 2-page executive summary of AI portfolio status, value delivered in business metrics, and next priorities.\n\nSecond, a 'first light' demo cadence: Every time we hit a meaningful milestone — first working prototype on real data, first production deployment — I schedule a 20-minute demo with the relevant executive sponsor. Nothing sustains investment like seeing the thing work.\n\nThird, a proactive pipeline refresh: Every quarter I bring 3-5 new use case ideas to leadership with preliminary value estimates and feasibility assessments. This signals the AI CoE is continuously generating value.\n\nThe underlying principle: executives fund what they trust and trust what they understand."},{id:"t2q13",category:"Influencing",difficulty:"Advanced",question:"How do you drive AI adoption across business units when you don't have direct authority over them?",answer:"Authority-based adoption is brittle — people comply while you're watching and revert when you're not. Influence-based adoption is durable because people have internalized the value.\n\nMy approach:\n\nStart with the motivated few: I identify the 2-3 people in each business unit who are already curious about AI — my 'lighthouse users' — I invest disproportionately in their success because they become internal champions.\n\nMake the first experience frictionless: The first time a business analyst uses an AI tool I've built or recommended, it must work, it must save them time, and it must require no more than 15 minutes of learning. The first experience sets the permanent expectation.\n\nCreate social proof at scale: When a champion in Legal saves 3 hours on contract review, I make sure Finance hears about it through internal comms, Viva Engage posts, and direct introductions.\n\nGive people language: I give them the talking points to describe AI value to their own managers.\n\n💡 'Lighthouse users' is a memorable, distinct term — use it."},{id:"t2q14",category:"Influencing",difficulty:"Advanced",question:"Describe a time you changed someone's mind about AI — from skeptic to champion.",answer:"The most significant example is the CARA initiative with the Legal team.\n\nSituation: The General Counsel's office was openly skeptical — one senior attorney told me directly: 'AI will hallucinate a compliance answer and we'll miss an obligation. No thank you.'\n\nMy approach: I didn't argue. I said: 'Your concern is legitimate and I share it. Let me show you what the AI produces on 50 contracts you've already reviewed. You grade it. We compare notes. If it's not good enough, we don't build it.'\n\nWhat I did: I ran a structured silent evaluation — the senior paralegal reviewed 50 historical contracts for specific clause types, and CARA flagged the same contracts. We compared independently.\n\nThe result: 91% agreement on clause identification. More importantly, in 6 of the 9% disagreement cases, CARA had actually caught things she had missed. That moment changed everything.\n\nShe became our most vocal internal champion, co-presented CARA results to the GC, trained the rest of her team, and submitted the initiative for recognition at our year-end review.\n\nThe lesson: the most durable influence comes from creating an experience where the skeptic discovers the value themselves."},{id:"t2q15",category:"Influencing",difficulty:"Advanced",question:"How do you build a coalition of AI champions across a large enterprise?",answer:"A coalition is not a mailing list — it's a network of people who are actively advocating for AI in their own spheres of influence because they've personally experienced its value.\n\nI build coalitions through three mechanisms:\n\nFirst, the inner circle: 8-12 people across business units who are early adopters and trusted voices in their functions. They get to influence what we build before anyone else does.\n\nSecond, the AI Council or Community of Practice: A broader standing group — 30-50 people — who meet monthly to share learnings, surface use case ideas, and celebrate wins. The agenda is curated so it's always valuable, never a status report.\n\nThird, structured recognition: I created the AI Shark Tank event specifically to surface and celebrate internal AI champions at a company-wide level. When a business analyst presents an AI solution to a panel of executives and gets funded, that story travels across the company and recruits the next wave of champions."},{id:"t2q16",category:"Influencing",difficulty:"Advanced",question:"How do you influence peers at the same leadership level who control resources or data you need for an AI initiative?",answer:"Peer influence is where many AI leaders struggle — they're comfortable with top-down sponsorship but haven't built the lateral relationships that actually unlock execution.\n\nMy approach: I lead with their agenda, not mine.\n\nBefore I ask a peer for anything — data access, engineering resources, stakeholder introductions — I spend time understanding what they're trying to accomplish and whether there's a genuine intersection with what I'm building. If there is, I frame the conversation as a partnership with explicit mutual benefit.\n\nI also invest in peer relationships before I need them — sharing relevant AI learnings, tools, and research without asking for anything in return. When I need to call in a favor, I've already built the relational account.\n\nFor data specifically: data owners are most resistant when they feel the data will be used in ways they don't control. I address this by involving them in the governance design — they get to define the access controls, the use restrictions, and the audit mechanism. Ownership with visibility almost always beats resistance."},{id:"t2q17",category:"Influencing",difficulty:"Advanced",question:"How do you sustain AI momentum after initial excitement fades?",answer:"The 'AI hype cycle' inside companies is real: executive enthusiasm at launch, early adopter excitement, then a valley of disillusionment when the first use case is harder than expected. Surviving the valley is what separates transformative AI programs from one-off pilots.\n\nMy strategies:\n\nAnchor to outcomes, not activity: The conversation must shift immediately to 'what business value did we deliver?' I establish baseline metrics in week one of every initiative.\n\nCreate a visible win cadence: I sequence the AI portfolio so there's always something new to celebrate — a first production deployment, a new champion story, a use case that's scaling.\n\nAcknowledge the hard parts publicly: Being honest about difficulties actually builds more trust than projecting false confidence.\n\nBuild the next wave: The best way to sustain momentum is to keep creating new believers. A program that's only deepening with existing believers will eventually plateau; a program that's also broadening creates compounding momentum.\n\n💡 'The valley of disillusionment' language signals strategic AI program experience — use it."},{id:"t2q18",category:"Influencing",difficulty:"Advanced",question:"How do you handle a situation where a mid-level manager is actively blocking AI adoption in their team?",answer:"Active blockers at the middle management layer are the most underestimated risk in enterprise AI adoption — more dangerous than executive skepticism because they're harder to see and address.\n\nI diagnose before I act. Middle managers block AI adoption for predictable reasons: fear their team will become redundant, concern that AI will expose performance issues in their area, or legitimate worry that the AI solution will break existing workflows.\n\nFor job displacement fear: I ask for a meeting and say: 'The goal of this solution is not to reduce headcount. It's to remove the work your team hates doing so they can focus on the work that requires their judgment.' Then: 'What would your team do with 20% more time?'\n\nFor performance exposure: I work with the manager to address it constructively — not to use AI as an audit tool without their knowledge.\n\nFor workflow disruption: I involve their team in the integration design so the solution fits their actual workflow.\n\nIf the blocker persists, I escalate the problem (adoption is stalling, business value is being delayed), not the person.\n\n💡 Never go around a mid-level manager to their team without their knowledge — it creates lasting enemies."}]},tab3:{id:"tab3",title:"Gap Questions — Vol 3",color:"#30D158",categories:["Org Design","Failure & Learning","Market Awareness","Self-Awareness","Conflict","Talent & Scaling","Why Cardinal"],questions:[{id:"t3q1",category:"Org Design",difficulty:"Advanced",question:"How would you structure and staff the Applied AI team on day one and over the first 12 months?",answer:"I'd organize around three layers that mirror the JD's operating model:\n\nLayer 1 — Delivery pods (the core): Small, 3-4 person squads each comprising an AI/ML engineer, a data engineer, and a solution architect or senior engineer acting as tech lead. Each pod is forward-deployed to a specific business domain for 8-12 weeks, then redeployed.\n\nLayer 2 — Platform and accelerators (the multiplier): 1-2 engineers whose primary job is extracting reusable patterns from pod deliveries and maintaining the internal accelerator library — prompt templates, data connectors, evaluation frameworks, deployment patterns. Without this layer, every pod reinvents the wheel.\n\nLayer 3 — Governance and engineering excellence (the foundation): One engineering manager whose remit is code quality standards, responsible AI gates, onboarding, and offshore/vendor coordination.\n\nIn the first 90 days I'd assess the existing team against this model. By month 12 the target state is two fully operational delivery pods, a growing accelerator library with measurable reuse across business units, and a governance rhythm that moves at delivery speed.\n\n💡 Name the three layers explicitly — it signals that you've thought about org design, not just delivery."},{id:"t3q2",category:"Org Design",difficulty:"Advanced",question:"How do you decide what to build in-house, buy as a vendor product, or partner on for AI capabilities?",answer:"I use a three-factor framework: Strategic differentiation, Data sensitivity, and Build-to-reuse potential.\n\nBuild in-house when: the capability requires Cardinal Health's proprietary data to be valuable (a contract intelligence agent trained on our specific contract language), the capability will be reused across 5+ business areas, or the domain knowledge required is so specific that no vendor product will fit without heavy customization.\n\nBuy a vendor product when: the problem is horizontal and well-solved (code generation with GitHub Copilot, document processing with off-the-shelf OCR, meeting summarization with Teams Premium), and the speed-to-value of buying dramatically outpaces building.\n\nPartner when: the capability requires specialized AI expertise we don't have and won't need long-term, or when we need to move faster than our team capacity allows.\n\nThe failure mode I watch for: building in-house out of pride or control instinct when a vendor solution would serve the business better and faster. My rule: default to buy for horizontal capabilities, default to build for Cardinal-specific intelligence.\n\nI also apply a 'reuse ceiling' test: if what we build won't be reused across at least two business areas, the business case for in-house build is usually weak.\n\n💡 The 'reuse ceiling' test is a sharp, memorable concept — it signals product thinking."},{id:"t3q3",category:"Org Design",difficulty:"Advanced",question:"How do you maintain quality and consistency when your team is embedded across different business units simultaneously?",answer:"The risk of forward-deployed teams is fragmentation — each pod develops its own standards, and the outputs aren't compatible or reusable. I address this through what I call 'shared rails and local freedom.'\n\nShared rails — non-negotiable across all pods: A common development framework (CLAUDE.md / AGENTS.md architecture documents, standardized evaluation harnesses, responsible AI gates, code review protocols). A shared accelerator library that pods are required to contribute to after each delivery. A weekly all-team engineering sync where pods share what they're building and learning — cross-pollination by design.\n\nLocal freedom — pod-specific: The business domain focus, the stakeholder relationship, the specific use case design, the technology choices within approved guardrails.\n\nThe engineering manager role is critical here — they're the connective tissue between pods, maintaining the shared rails without slowing down local delivery."},{id:"t3q4",category:"Failure & Learning",difficulty:"Advanced",question:"Tell me about an AI initiative that failed. What happened and what did you learn?",answer:"The most instructive failure I've experienced was an early predictive analytics model we built for field sales — a churn prediction model that was supposed to flag at-risk customer accounts before they reduced spend.\n\nWhat happened: The model performed well in validation — strong AUC, reasonable precision. We were proud of it. We deployed it via a report that the sales leadership team received weekly. Three months later, adoption was near zero.\n\nWhen I went back to understand why, I found three compounding failures — all mine to own:\n\nFirst, I had optimized for model accuracy and ignored usability. The output was a ranked list of account IDs with a risk score — technically correct but completely disconnected from how a sales manager actually makes decisions.\n\nSecond, I had not validated the model's outputs with the people who would use them before deploying. The sales managers immediately identified accounts the model was flagging that 'everyone knows are fine' — because the model had no visibility into relationship context the reps carried in their heads.\n\nThird, I had defined success as model performance, not business adoption. Those are not the same thing.\n\nWhat changed permanently: I now require a 'day in the life' session with end users before finalizing any solution design. I define adoption metrics alongside accuracy metrics from day one.\n\n💡 Own the failure completely — no hedging, no blaming data quality or stakeholders."},{id:"t3q5",category:"Failure & Learning",difficulty:"Advanced",question:"What's the biggest mistake you've made as an AI leader, and what did it teach you?",answer:"The biggest mistake I've made is moving to scale before proving adoption.\n\nEarly in building the AI CoE, I was energized by the pace of AI development and eager to show broad impact. I launched a set of AI tools and frameworks across multiple business units simultaneously — a prompt library, a NotebookLM agent suite, a self-service analytics AI — all within a short window.\n\nThe tools were genuinely good. The training was well-received. But six months later, sustained usage was uneven. I had optimized for launch breadth instead of adoption depth.\n\nThe mistake: I confused 'deployed to' with 'adopted by.' I had measured rollout completion, not behavioral change.\n\nWhat I changed: I now run a 'land and expand' model instead of broad simultaneous rollout. I pick one team, one use case, one champion — get to deep adoption and a credible success story — then use that story and that champion to pull in
